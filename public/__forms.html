<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="rfq-main" method="POST" action="/thank-you" data-netlify="true" netlify hidden>
      <input type="hidden" name="form-name" value="rfq-main" />
      <input type="email" name="Email" required />
      <input name="Name" />
      <input name="Company" />
      <input name="Country / City" />
      <input name="Phone / WhatsApp / Telegram" />
      <input name="Product Model" />
      <input name="Quantity" />
      <input name="Application" />
      <textarea name="Message"></textarea>
    </form>
  </body>
</html>
